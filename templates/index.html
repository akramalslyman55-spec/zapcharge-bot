<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapcharge</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div id="loading-view" class="screen">
    <div class="spinner"></div>
  </div>

  <div id="error-view" class="screen hidden">
    <p class="error-text">تعذّر التحقق من الحساب. جرّب تفتح المتجر من داخل تيليجرام.</p>
  </div>

  <div id="store-view" class="screen hidden">
    <header class="topbar">
      <span class="brand">Zapcharge</span>
      <span class="balance-pill" id="store-balance">0.00$</span>
    </header>
    <main class="content">
      <p class="placeholder">واجهة المتجر — رح نصممها بالتفصيل بالخطوة الجاية.</p>
    </main>
  </div>

  <div id="admin-view" class="screen hidden">
    <header class="topbar admin">
      <span class="brand">Zapcharge <span class="admin-tag">إدارة</span></span>
    </header>

    <nav class="admin-nav">
      <button class="nav-btn active" data-admin-section="admin-dashboard-section">الرئيسية</button>
      <button class="nav-btn" data-admin-section="admin-services-section">الخدمات</button>
      <button class="nav-btn" data-admin-section="admin-deposits-section">الإيداعات</button>
    </nav>

    <main class="content">
      <div id="admin-dashboard-section" class="admin-section">
        <div class="stat-row">
          <div class="stat-card">
            <span class="stat-label">طلبات معلّقة</span>
            <span class="stat-value" id="stat-orders">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">إيداعات معلّقة</span>
            <span class="stat-value" id="stat-deposits">—</span>
          </div>
        </div>
        <p class="placeholder">باقي شاشات الإدارة (الطلبات، المشرفين...) رح نبنيها وحدة وحدة فوق هالهيكل.</p>
      </div>

      <div id="admin-services-section" class="admin-section hidden">
        <button class="btn-primary" id="open-add-service">+ إضافة خدمة</button>
        <div id="services-list" class="services-list"></div>
      </div>

      <div id="admin-deposits-section" class="admin-section hidden">
        <div id="deposits-list" class="services-list"></div>
      </div>
    </main>

    <div id="service-modal" class="modal hidden">
      <div class="modal-box">
        <h3 id="service-modal-title">إضافة خدمة</h3>

        <label class="field-label">التصنيف</label>
        <select id="service-category" class="field-input">
          <option value="games">ألعاب</option>
          <option value="subscriptions">اشتراكات</option>
          <option value="apps">تطبيقات</option>
          <option value="cards">بطاقات</option>
          <option value="recharge">تعبئة رصيد</option>
          <option value="bills">فواتير</option>
        </select>

        <label class="field-label">الاسم</label>
        <input id="service-name" class="field-input" type="text" placeholder="مثال: PUBG Mobile" />

        <label class="field-label">اسم الباقة (اختياري)</label>
        <input id="service-package" class="field-input" type="text" placeholder="مثال: 60 شدة" />

        <label class="field-label">السعر ($)</label>
        <input id="service-price" class="field-input" type="number" step="0.01" placeholder="0.00" />

        <label class="field-label">رابط الصورة (اختياري)</label>
        <input id="service-image" class="field-input" type="text" placeholder="https://..." />

        <label class="switch-row">
          <span>مفعّلة</span>
          <input id="service-active" type="checkbox" checked />
        </label>

        <div class="modal-actions">
          <button class="btn-secondary" id="cancel-service-modal">إلغاء</button>
          <button class="btn-primary" id="save-service">حفظ</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
            </html>
