<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapcharge</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div id="loading-view" class="screen">
    <div class="spinner"></div>
  </div>

  <div id="error-view" class="screen hidden">
    <p class="error-text">تعذّر التحقق من الحساب. جرّب تفتح المتجر من داخل تيليجرام.</p>
  </div>

  <div id="store-view" class="screen hidden">
    <header class="topbar">
      <span class="brand">Zapcharge</span>
      <span class="balance-pill" id="store-balance">0.00$</span>
    </header>
    <main class="content">
      <p class="placeholder">واجهة المتجر — رح نصممها بالتفصيل بالخطوة الجاية.</p>
    </main>
  </div>

  <div id="admin-view" class="screen hidden">
    <header class="topbar admin">
      <span class="brand">Zapcharge <span class="admin-tag">إدارة</span></span>
    </header>
    <main class="content">
      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-label">طلبات معلّقة</span>
          <span class="stat-value" id="stat-orders">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">إيداعات معلّقة</span>
          <span class="stat-value" id="stat-deposits">—</span>
        </div>
      </div>
      <p class="placeholder">باقي شاشات الإدارة (الطلبات، الإيداعات، الخدمات، المشرفين...) رح نبنيها وحدة وحدة فوق هالهيكل.</p>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
